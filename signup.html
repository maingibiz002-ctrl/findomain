<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaQuant | Secure Login</title>
    <link rel="stylesheet" href="signup.css">
      <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22black%22/><text y=%22.9em%22 font-size=%2280%22 font-family=%22serif%22 fill=%22%23FF6B00%22 x=%2250%%22 text-anchor=%22middle%22>α</text></svg>">

</head>
<body>
<div class="header-logo">
        <div class="logo-text">
            <span class="orange-box">α</span> ALPHA<span class="orange-text">QUANT</span>
        </div>
   

    <main class="login-container">
        <section class="welcome-side">
            <h1>Welcome!</h1>
            <div class="accent-line"></div>
            <p class="description">
                Access advanced quant strategies and institutional-grade risk management. 
                Master the markets with AlphaQuant Academy.
            </p>
            <button class="btn-primary">Learn More</button>
        </section>

        <section class="form-side">
            <div class="glass-card">
                <h2>Sign In</h2>
                <form id="login-form">
                    <div class="input-field">
                        <label>User Name</label>
                        <input type="text" placeholder="Enter your username" required>
                    </div>
                    <div class="input-field">
                        <label>Password</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-submit">Submit</button>
                </form>

                <div class="divider">
                    <span>Or</span>
                </div>

                <div class="social-row">
                    <i class="fab fa-facebook-f"></i>
                    <i class="fab fa-instagram"></i>
                    <i class="fab fa-twitter"></i>
                </div>

                <p class="footer-link">
                    Don't have an account? <a href="#">Sign Up</a>
                </p>
            </div>
        </section>
    </main>

</body>
</html>

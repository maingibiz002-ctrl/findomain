<section class="booking-section">
  <div class="booking-container">
    <div class="booking-header">
      <h2>Secure Your Strategy Session</h2>
      <p>Select your consultation track below to view available times.</p>
    </div>

    <form class="appointment-form">
      <!-- Step 1: Selection -->
      <div class="form-group">
        <label>Consultation Track</label>
        <select required>
          <option value="" disabled selected>Choose a specialization...</option>
          <option value="algo">Risk Management Consultation</option>
          <option value="academy">Trading Psychology Consultation</option>
          <option value="academy">Strategy Development Consultation</option>
          <option value="portfolio">Portfolio Creation Consultation</option>
          <option value="academy">Performance Analysis Consultation</option>
          <option value="psychology">Fundamental Analysis Consultation</option>
        </select>
      </div>

      <!-- Step 2: Details -->
      <div class="form-row">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="john@quantfinance.com" required>
        </div>
      </div>

      <!-- Step 3: Scheduling Placeholder -->
      <div class="form-group">
        <label>Preferred Date & Time</label>
        <input type="datetime-local" required>
      </div>

      <div class="form-group">
        <label>Briefly describe your current trading/finance goals</label>
        <textarea rows="4" placeholder="e.g., I am looking to improve my risk management skills..."></textarea>
      </div>

      <button type="submit" class="booking-btn">Confirm Appointment Request</button>
    </form>
    
    <p class="form-footer">You will receive a confirmation email within 2 hours of booking.</p>
  </div>
</section>
